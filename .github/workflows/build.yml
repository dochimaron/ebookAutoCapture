name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install pyautogui mss Pillow pyinstaller

      - name: EXE 빌드
        run: pyinstaller --onefile --windowed --name ebookAutoCapture ebookAutoCapture.py

      - name: 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ebookAutoCapture
          path: dist/ebookAutoCapture.exe
